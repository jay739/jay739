<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0F172A; stroke: #334155; stroke-width: 1; }
    .num { font: 700 28px 'Segoe UI', Ubuntu, Sans-Serif; fill: #f8fafc; text-anchor: middle; }
    .label { font: 600 13px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F59E0B; text-anchor: middle; text-transform: uppercase; letter-spacing: 1px; }
    .date { font: 400 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #94a3b8; text-anchor: middle; }
    .divider { stroke: #334155; stroke-width: 1; }
  </style>

  <rect class="bg" x="0.5" y="0.5" width="599" height="199" rx="10" />

  <text class="label" x="100" y="40">Total Contributions</text>
  <text class="num" x="100" y="95">398</text>
  <text class="date" x="100" y="150">Jan 1, 2016 - present</text>

  <line class="divider" x1="200" y1="30" x2="200" y2="170" />

  <circle cx="300" cy="95" r="38" fill="none" stroke="#F59E0B" stroke-width="4" opacity="0.5" />
  <text class="label" x="300" y="40">Current Streak</text>
  <text class="num" x="300" y="103" fill="#F59E0B">7</text>
  <text class="date" x="300" y="150">Jul 13, 2026 - Jul 20, 2026</text>

  <line class="divider" x1="400" y1="30" x2="400" y2="170" />

  <text class="label" x="500" y="40">Longest Streak</text>
  <text class="num" x="500" y="95">7</text>
  <text class="date" x="500" y="150">Jul 13, 2026 - Jul 19, 2026</text>
</svg>