name: Generate streak stats

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Generate streak-stats.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUT_PATH: profile/streak-stats.svg
        run: node .github/scripts/generate-streak-svg.mjs

      - name: Commit streak card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak-stats.svg
          git commit -m "Update streak-stats.svg - [Skip GitHub Action]" || exit 0
          git push
