name: Generate snake animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate github-contribution-grid-snake.svg
        uses: jay739/snk/svg-only@a12090140cfbb90ad8a808ef45380758a77be94b
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#F59E0B&color_dots=#1e293b,#78350f,#b45309,#d97706,#f59e0b
            dist/github-contribution-grid-snake-light.svg?palette=github-light&color_snake=#b45309&color_dots=#fef3c7,#fde68a,#fcd34d,#f59e0b,#b45309

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
