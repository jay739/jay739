name: Latest blog posts

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest posts from jay739.dev/rss.xml
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://jay739.dev/rss.xml"
          max_post_count: 5
          template: |+
            - [$title]($url) <sub><i>$date</i></sub>
          date_format: "mmm dd, yyyy"
          comment_tag_name: "BLOG-POST-LIST"
          commit_message: "chore: refresh latest blog posts"
