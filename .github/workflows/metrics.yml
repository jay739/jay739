name: Generate metrics

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    name: Core metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          config_order: base.header, isocalendar, languages, activity, community
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, dockerfile, makefile, shell, tex, jupyter notebook
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15
          plugin_lines: yes
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          config_padding: 0, 8 + 11%

  habits:
    name: Coding habits
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics.plugin.habits.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: metrics.plugin.habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          config_padding: 0, 8 + 11%

  topics:
    name: Topics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics.plugin.topics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: metrics.plugin.topics.svg
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: stars
          plugin_topics_limit: 0
