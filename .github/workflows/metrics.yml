name: Generate metrics

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  github-metrics:
    name: Core metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          config_order: base.header, isocalendar, languages, activity, community
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, dockerfile, makefile, shell, tex, jupyter notebook
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15
          plugin_lines: yes
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          config_padding: 0, 8 + 11%

  habits:
    name: Coding habits
    needs: github-metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics.plugin.habits.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: metrics.plugin.habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          config_padding: 0, 8 + 11%

  topics:
    name: Topics
    needs: habits
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics.plugin.topics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: metrics.plugin.topics.svg
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: stars
          plugin_topics_limit: 0

  achievements:
    name: Achievements
    needs: topics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics.plugin.achievements.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: metrics.plugin.achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 8
          config_padding: 0, 8 + 11%

  repositories:
    name: Featured repositories
    needs: achievements
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics.plugin.repositories.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: metrics.plugin.repositories.svg
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: jay739/PodcastAI,jay739/portfolio-site,jay739/omnifin
          plugin_repositories_pinned: 3
          plugin_repositories_starred: 3
          plugin_repositories_order: featured,pinned,starred
          plugin_repositories_affiliations: owner
          config_padding: 0, 8 + 11%

  notable:
    name: Notable contributions
    needs: repositories
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics.plugin.notable.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: metrics.plugin.notable.svg
          base: ""
          plugin_notable: yes
          plugin_notable_from: all
          config_padding: 0, 8 + 11%
